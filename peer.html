<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeleChat — Peer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    .tg-input:focus    { border-color: #26a17b; }
    .tg-textarea:focus { border-color: #26a17b; }
    .msg-textarea:focus { border-color: #26a17b; }
    .btn-primary { background: linear-gradient(135deg, #0f7b54, #26a17b); box-shadow: 0 4px 20px rgba(38,161,123,0.3); }
    .btn-primary:hover { background: linear-gradient(135deg, #0d6b48, #2eb88a); }
    .send-btn { background: linear-gradient(135deg, #0f7b54, #26a17b); box-shadow: 0 2px 10px rgba(38,161,123,0.4); }
    .bubble.sent { background: linear-gradient(135deg, #0f5c3e, #1a7a54) !important; }
    .bubble.audio-bubble.sent { background: linear-gradient(135deg, #0f5c3e, #1a7a54) !important; }
  </style>
</head>
<body>

<!-- ══════════════ SETUP ══════════════ -->
<div id="setup-screen">
  <div class="absolute inset-0 bg-dots pointer-events-none"></div>
  <div class="card rounded-2xl p-7 w-full max-w-sm flex flex-col gap-5 relative z-10">
    <div class="flex items-center gap-3 mb-1">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-600 to-green-400 flex items-center justify-center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      </div>
      <div>
        <h1 class="text-xl font-extrabold text-white">Join Chat</h1>
        <p class="text-xs text-[#6d9ab5]">You are the Peer</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div class="step-num active">1</div><div class="step-line"></div>
      <div class="step-num active">2</div><div class="step-line"></div>
      <div class="step-num" id="step3">3</div>
    </div>
    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-[#6d9ab5] uppercase tracking-widest">Your Name</label>
      <input id="peerName" class="tg-input" placeholder="e.g. Bob" maxlength="32" autocomplete="off"/>
    </div>
    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-[#6d9ab5] uppercase tracking-widest">Host Invite Code</label>
      <textarea id="hostCodeInput" class="tg-textarea" placeholder="Paste the host's code here…" rows="4"></textarea>
    </div>
    <button onclick="joinAsPeer()" class="btn-primary py-3 rounded-xl text-sm w-full flex items-center justify-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
      Join &amp; Generate Response
    </button>
    <a href="index.html" class="text-center text-xs text-[#4e7a96] hover:text-[#6d9ab5] transition-colors">← Back to home</a>
  </div>
</div>

<!-- ══════════════ CHAT ══════════════ -->
<div id="chat-screen">
  <div id="topbar">
    <button onclick="window.location.href='index.html'" class="w-8 h-8 rounded-full bg-[#263545] flex items-center justify-center hover:bg-[#2e3f52] transition-colors border-0 cursor-pointer flex-shrink-0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#aac5d9"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div id="host-avatar" class="avatar" style="background:linear-gradient(135deg,#2b6cb0,#2196f3)">H</div>
    <div class="flex flex-col flex-1 min-w-0">
      <span id="topbar-name" class="text-white font-bold text-sm truncate">Connecting…</span>
      <div id="topbar-status" class="status-badge status-waiting w-fit">
        <div class="waiting-dot"></div><span>Waiting</span>
      </div>
    </div>
    <button id="copy-resp-btn" onclick="openRespModal()" class="w-9 h-9 rounded-full bg-[#263545] flex items-center justify-center hover:bg-[#2e3f52] transition-colors border-0 cursor-pointer flex-shrink-0" title="Show response code">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#aac5d9"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
    </button>
  </div>

  <div id="messages"></div>

  <div id="emoji-picker-container" class="hidden"></div>

  <!-- Attachment popup menu -->
  <div id="attach-menu" class="hidden">
    <button class="attach-menu-item" id="menu-emoji-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#f9ca24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
      Emoji
    </button>
    <button class="attach-menu-item" id="menu-img-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#4fc3f7"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      Image / GIF
    </button>
    <button class="attach-menu-item" id="menu-audio-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#a29bfe"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      Audio File
    </button>
  </div>

  <div id="input-area">
    <!-- multiple attribute added for multi-image/audio selection -->
    <input type="file" id="img-input"   accept="image/*,.gif" class="hidden" multiple/>
    <input type="file" id="audio-input" accept="audio/*"      class="hidden" multiple/>

    <button id="clip-btn" title="Attach">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#aac5d9"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
    </button>

    <textarea id="message" class="msg-textarea" rows="1" maxlength="2000" placeholder="Message"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- ══════════════ RESPONSE CODE MODAL ══════════════ -->
<div id="resp-modal" class="modal-bg hidden">
  <div class="modal">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-white font-bold text-base">Your Response Code</h3>
      <button onclick="closeRespModal()" class="w-7 h-7 rounded-full bg-[#263545] flex items-center justify-center border-0 cursor-pointer hover:bg-[#2e3f52] transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#aac5d9"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <p class="text-[#6d9ab5] text-sm mb-3">Copy and send this code back to the Host to connect.</p>
    <div class="bg-[#263545] rounded-xl p-3 mb-4 break-all text-xs text-[#aac5d9] font-mono max-h-28 overflow-y-auto" id="resp-code-display"></div>
    <div class="flex gap-3">
      <button id="resp-copy-btn" onclick="copyRespCode()" class="btn-blue flex-1 py-2.5 rounded-xl text-sm flex items-center justify-center gap-2">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        Copy
      </button>
      <button onclick="closeRespModal()" class="btn-secondary flex-1 py-2.5 rounded-xl text-sm">Close</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  let authCode = '', localConnection, receiveChannel, statusCheckInterval;
  let peerDisplayName = 'You', hostName = 'Host';
  let chunkedReceiver;

  const setupScreen    = document.getElementById('setup-screen');
  const chatScreen     = document.getElementById('chat-screen');
  const respModal      = document.getElementById('resp-modal');
  const respCodeDisplay= document.getElementById('resp-code-display');
  const topbarName     = document.getElementById('topbar-name');
  const topbarStatusEl = document.getElementById('topbar-status');
  const hostAvatar     = document.getElementById('host-avatar');
  const messagesEl     = document.getElementById('messages');
  const messageInput   = document.getElementById('message');
  const respCopyBtn    = document.getElementById('resp-copy-btn');
  const copyRespBtn    = document.getElementById('copy-resp-btn');
  const emojiContainer = document.getElementById('emoji-picker-container');
  const attachMenu     = document.getElementById('attach-menu');
  const clipBtn        = document.getElementById('clip-btn');

  function appendMessage(content, side, name, isHTML = false) {
    const row = buildMessageRow(content, side, name, isHTML);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function openRespModal() {
    respCodeDisplay.textContent = authCode;
    respModal.classList.remove('hidden');
    gsap.from(respModal.querySelector('.modal'), { y: 20, opacity: 0, duration: 0.3, ease: 'power2.out' });
  }
  function closeRespModal() { respModal.classList.add('hidden'); }

  function copyRespCode() {
    navigator.clipboard.writeText(authCode);
    respCopyBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Copied!`;
    setTimeout(() => {
      respCopyBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy`;
    }, 2500);
  }

  function monitorChannel() {
    if (receiveChannel.readyState !== 'open') {
      setStatus(topbarStatusEl, 'disconnected', `${hostName} left`);
      clearInterval(statusCheckInterval);
    }
  }

  /* ── Clip menu ── */
  clipBtn.addEventListener('click', e => {
    e.stopPropagation(); emojiContainer.classList.add('hidden');
    attachMenu.classList.toggle('hidden');
    if (!attachMenu.classList.contains('hidden'))
      gsap.from(attachMenu, { y: 10, opacity: 0, duration: 0.2, ease: 'power2.out' });
  });
  document.addEventListener('click', () => { attachMenu.classList.add('hidden'); emojiContainer.classList.add('hidden'); });

  document.getElementById('menu-emoji-btn').addEventListener('click', e => {
    e.stopPropagation(); attachMenu.classList.add('hidden');
    if (emojiContainer.classList.contains('hidden')) {
      if (!window._emojiPickerLoaded) {
        const s = document.createElement('script'); s.type = 'module';
        s.src = 'https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js';
        document.head.appendChild(s); window._emojiPickerLoaded = true;
      }
      if (!emojiContainer.querySelector('emoji-picker')) {
        const picker = document.createElement('emoji-picker');
        emojiContainer.appendChild(picker);
        picker.addEventListener('emoji-click', ev => {
          messageInput.focus();
          const pos = messageInput.selectionStart, val = messageInput.value;
          messageInput.value = val.slice(0, pos) + ev.detail.unicode + val.slice(pos);
          messageInput.selectionStart = messageInput.selectionEnd = pos + ev.detail.unicode.length;
          autoGrow(messageInput);
        });
      }
      emojiContainer.classList.remove('hidden');
      gsap.from(emojiContainer, { y: 10, opacity: 0, duration: 0.2, ease: 'power2.out' });
    } else { emojiContainer.classList.add('hidden'); }
  });

  document.getElementById('menu-img-btn').addEventListener('click', e => {
    e.stopPropagation(); attachMenu.classList.add('hidden');
    document.getElementById('img-input').click();
  });
  document.getElementById('img-input').addEventListener('change', async e => {
    const files = Array.from(e.target.files); if (!files.length) return; e.target.value = '';
    for (const file of files) await sendMediaFile(file);
  });

  document.getElementById('menu-audio-btn').addEventListener('click', e => {
    e.stopPropagation(); attachMenu.classList.add('hidden');
    document.getElementById('audio-input').click();
  });
  document.getElementById('audio-input').addEventListener('change', async e => {
    const files = Array.from(e.target.files); if (!files.length) return; e.target.value = '';
    for (const file of files) await sendMediaFile(file);
  });

  /* ── Input ── */
  messageInput.addEventListener('input', () => autoGrow(messageInput));
  messageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  /* ── Send media (chunked) ── */
  async function sendMediaFile(file) {
    if (!receiveChannel || receiveChannel.readyState !== 'open') { alert('Not connected yet.'); return; }
    const { type, kind, name, dataURL } = await prepareMediaPayload(file);
    if (kind === 'audio' || isAudioType(type, name)) {
      const albumArt = await extractAlbumArt(file);
      appendAudioMessage(dataURL, name, 'sent', peerDisplayName, messagesEl, albumArt);
    } else {
      appendMessage(buildMediaNode(type, dataURL, name), 'sent', peerDisplayName);
    }
    await sendFileChunked(receiveChannel, file);
  }

  /* ── Send text ── */
  function sendMessage() {
    if (!receiveChannel || receiveChannel.readyState !== 'open') return;
    const raw = messageInput.value.trim(); if (!raw) return;
    const msg = sanitizeHTML(raw).replace(/\n/g, '<br>');
    appendMessage(msg, 'sent', peerDisplayName, true);
    receiveChannel.send(msg);
    messageInput.value = ''; messageInput.style.height = 'auto';
  }

  /* ── WebRTC ── */
  function joinAsPeer() {
    const nameVal = sanitizeHTML(document.getElementById('peerName').value.trim());
    const codeVal = document.getElementById('hostCodeInput').value.trim();
    if (!nameVal) { alert('Please enter your name.'); return; }
    if (!codeVal) { alert('Please paste the host invite code.'); return; }
    peerDisplayName = nameVal;

    let offer;
    try { offer = JSON.parse(safeDecode(codeVal)); } catch(e) { return; }

    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    localConnection = new RTCPeerConnection(config);

    localConnection.ondatachannel = event => {
      receiveChannel = event.channel;

      chunkedReceiver = new ChunkedReceiver(({ type, kind, name, dataURL }) => {
        if (kind === 'audio' || isAudioType(type, name)) {
          appendAudioMessage(dataURL, name, 'received', hostName, messagesEl, null);
        } else {
          appendMessage(buildMediaNode(type, dataURL, name), 'received', hostName);
        }
      });

      receiveChannel.onopen = () => {
        receiveChannel.send(`NAME:${peerDisplayName}`);
        setStatus(topbarStatusEl, 'connected', hostName);
        topbarName.textContent = hostName;
        statusCheckInterval = setInterval(monitorChannel, 1000);
        copyRespBtn.style.display = 'none';
      };

      receiveChannel.onmessage = event => {
        const raw = event.data;
        if (typeof raw !== 'string') return;
        if (chunkedReceiver.feed(raw)) return;
        if (raw.startsWith('NAME:')) {
          hostName = sanitizeHTML(raw.substring(5));
          topbarName.textContent = hostName;
          hostAvatar.textContent = hostName[0].toUpperCase();
          setStatus(topbarStatusEl, 'connected', hostName);
          return;
        }
        const parsed = parseIncoming(raw);
        if (parsed.isMedia) { appendMessage(parsed.node, 'received', hostName); return; }
        appendMessage(sanitizeHTML(raw).replace(/&lt;br&gt;/g, '<br>'), 'received', hostName, true);
      };

      receiveChannel.onclose = () => {
        clearInterval(statusCheckInterval);
        setStatus(topbarStatusEl, 'disconnected', `${hostName} disconnected`);
      };
    };

    localConnection.onicecandidate = ({ candidate }) => {
      if (candidate) authCode = safeEncode(localConnection.localDescription);
    };

    localConnection.setRemoteDescription(offer)
      .then(() => localConnection.createAnswer())
      .then(answer => localConnection.setLocalDescription(answer).then(() => answer))
      .then(answer => {
        authCode = safeEncode(answer);
        setupScreen.style.display = 'none';
        chatScreen.style.display = 'flex';
        gsap.from(chatScreen, { opacity: 0, duration: 0.4 });
        addDateStamp(messagesEl);
        setStatus(topbarStatusEl, 'waiting', 'Awaiting host…');
        topbarName.textContent = 'Awaiting host…';
        openRespModal();
      });
  }
</script>
</body>
</html>
