<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Chat - Main Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #36393f; 
            color: #dcddde; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background-color: #2f3136; 
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff; 
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #b9bbbe; 
        }

        .button-container {
            display: flex;
            flex-direction: row;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            background-color: #5865f2;
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: #4752c4; 
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.5);
            transform: scale(1.03);
        }

        @media (max-width: 600px) {
            .title {
                font-size: 1.7rem;
            }

            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Welcome to WebRTC Chat</h1>
        <p class="subtitle">Please choose one of the following options:</p>
        <div class="button-container">
            <button class="btn" onclick="window.location.href='host.html'">Go to Host Page</button>
            <button class="btn" onclick="window.location.href='peer.html'">Go to Peer Page</button>
        </div>
    </div>
</body>
</html>
