<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeleChat — Secure P2P</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: auto;
      min-height: 100vh;
      overflow: auto;
    }
    .bg-dots {
      background-image: radial-gradient(circle, #2b5278 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.35;
    }
    .btn-host {
      background: linear-gradient(135deg, #2b6cb0, #2196f3);
      box-shadow: 0 4px 24px rgba(33,150,243,0.35);
      transition: all 0.2s ease;
    }
    .btn-host:hover {
      background: linear-gradient(135deg, #2563eb, #42a5f5);
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(33,150,243,0.5);
    }
    .btn-peer {
      background: linear-gradient(135deg, #0f7b54, #26a17b);
      box-shadow: 0 4px 24px rgba(38,161,123,0.35);
      transition: all 0.2s ease;
    }
    .btn-peer:hover {
      background: linear-gradient(135deg, #0d6b48, #2eb88a);
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(38,161,123,0.5);
    }
    .logo-ring { animation: spin-slow 12s linear infinite; }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.85)} }
    .float { animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .badge { animation: badge-pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes badge-pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    button { transition: all 0.2s ease; }
  </style>
</head>
<body>
  <div class="absolute inset-0 bg-dots pointer-events-none"></div>

  <div class="relative z-10 flex flex-col items-center gap-8 px-4 w-full max-w-md">
    <div class="float flex flex-col items-center gap-4">
      <div class="relative">
        <div class="logo-ring absolute inset-0 rounded-full border-2 border-dashed border-blue-400/30 scale-125"></div>
        <div class="w-24 h-24 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center shadow-2xl shadow-blue-900/50">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.68 7.94c-.12.57-.45.71-.9.44l-2.5-1.84-1.2 1.16c-.13.13-.25.25-.51.25l.18-2.56 4.64-4.19c.2-.18-.04-.27-.31-.09L7.62 14.81l-2.46-.77c-.53-.17-.54-.53.12-.78l9.62-3.71c.44-.16.83.11.74.75z" fill="white"/>
          </svg>
        </div>
        <div class="pulse-dot absolute -bottom-1 -right-1 w-5 h-5 bg-green-400 rounded-full border-2 border-[#17212b]"></div>
      </div>
      <div class="text-center">
        <h1 class="text-3xl font-extrabold text-white tracking-tight">TeleChat</h1>
        <p class="text-sm text-[#6d9ab5] mt-1 font-medium">Peer-to-peer · No servers · No logs</p>
      </div>
    </div>

    <div class="card w-full rounded-2xl p-6 flex flex-col gap-5">
      <div class="flex items-center gap-3 pb-4 border-b border-white/5">
        <div class="badge w-2 h-2 rounded-full bg-blue-400"></div>
        <p class="text-[#aac5d9] text-sm font-semibold uppercase tracking-widest">Choose your role</p>
      </div>

      <button onclick="window.location.href='host.html'" class="btn-host w-full py-4 rounded-xl text-white font-bold text-base flex items-center justify-center gap-3">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        Start as Host
      </button>

      <button onclick="window.location.href='peer.html'" class="btn-peer w-full py-4 rounded-xl text-white font-bold text-base flex items-center justify-center gap-3">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        Join as Peer
      </button>

      <div class="flex items-center justify-center gap-6 pt-2">
        <div class="flex items-center gap-1.5 text-xs text-[#4e7a96]">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          End-to-End
        </div>
        <div class="flex items-center gap-1.5 text-xs text-[#4e7a96]">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
          No Relay
        </div>
        <div class="flex items-center gap-1.5 text-xs text-[#4e7a96]">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
          WebRTC
        </div>
      </div>
    </div>
  </div>

  <script>
    gsap.from(".card",  { y: 40, opacity: 0, duration: 0.7, ease: "power3.out", delay: 0.2 });
    gsap.from(".float", { y: -20, opacity: 0, duration: 0.6, ease: "back.out(1.7)" });
  </script>
</body>
</html>
