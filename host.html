<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeleChat — Host</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Host accent: blue */
    .tg-input:focus   { border-color: #2196f3; }
    .tg-textarea:focus{ border-color: #2196f3; }
    .msg-textarea:focus { border-color: #2196f3; }
  </style>
</head>
<body>

<!-- ══════════════ SETUP ══════════════ -->
<div id="setup-screen">
  <div class="absolute inset-0 bg-dots pointer-events-none"></div>
  <div class="card rounded-2xl p-7 w-full max-w-sm flex flex-col gap-5 relative z-10">
    <div class="flex items-center gap-3 mb-2">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <div>
        <h1 class="text-xl font-extrabold text-white">New Chat</h1>
        <p class="text-xs text-[#6d9ab5]">You are the Host</p>
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-[#6d9ab5] uppercase tracking-widest">Your Name</label>
      <input id="hostName" class="tg-input" placeholder="e.g. Alice" maxlength="32" autocomplete="off"/>
    </div>

    <button id="createAuthBtn" onclick="startHost()" class="btn-primary py-3 rounded-xl text-sm w-full flex items-center justify-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      Generate Invite Code
    </button>

    <a href="index.html" class="text-center text-xs text-[#4e7a96] hover:text-[#6d9ab5] transition-colors">← Back to home</a>
  </div>
</div>

<!-- ══════════════ CHAT ══════════════ -->
<div id="chat-screen">
  <div id="topbar">
    <button onclick="window.location.href='index.html'" class="w-8 h-8 rounded-full bg-[#263545] flex items-center justify-center hover:bg-[#2e3f52] transition-colors border-0 cursor-pointer flex-shrink-0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#aac5d9"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div id="peer-avatar" class="avatar" style="background:linear-gradient(135deg,#0f7b54,#26a17b)">P</div>
    <div class="flex flex-col flex-1 min-w-0">
      <span id="topbar-name" class="text-white font-bold text-sm truncate">Waiting…</span>
      <div id="topbar-status" class="status-badge status-waiting w-fit">
        <div class="waiting-dot"></div><span>Waiting for peer</span>
      </div>
    </div>
    <button id="share-btn" onclick="openShareModal()" class="w-9 h-9 rounded-full bg-[#263545] flex items-center justify-center hover:bg-[#2e3f52] transition-colors border-0 cursor-pointer flex-shrink-0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#aac5d9"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
    </button>
  </div>

  <div id="messages"></div>

  <!-- Emoji picker -->
  <div id="emoji-picker-container" class="hidden" style="position:absolute;bottom:70px;left:12px;z-index:100;"></div>

  <div id="input-area" style="position:relative;">
    <!-- Attach bar -->
    <div id="attach-bar">
      <!-- Emoji -->
      <button class="attach-btn" id="emoji-btn" title="Emoji">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#aac5d9"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
      </button>
      <!-- Image / GIF -->
      <button class="attach-btn" id="img-btn" title="Image / GIF">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#aac5d9"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </button>
      <!-- Audio -->
      <button class="attach-btn" id="audio-btn" title="Audio file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#aac5d9"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
      </button>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="img-input"   accept="image/*,.gif" class="hidden"/>
    <input type="file" id="audio-input" accept="audio/*"      class="hidden"/>

    <textarea id="message" class="msg-textarea" rows="1" maxlength="2000" placeholder="Message"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- ══════════════ SHARE MODAL ══════════════ -->
<div id="share-modal" class="modal-bg hidden">
  <div class="modal">
    <div class="flex items-center justify-between mb-4">
      <h3 id="modal-title" class="text-white font-bold text-base">Invite Code</h3>
      <button onclick="closeModal()" class="w-7 h-7 rounded-full bg-[#263545] flex items-center justify-center border-0 cursor-pointer hover:bg-[#2e3f52] transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#aac5d9"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <p id="modal-desc" class="text-[#6d9ab5] text-sm mb-3">Share this code with the peer to connect.</p>
    <div class="bg-[#263545] rounded-xl p-3 mb-4 break-all text-xs text-[#aac5d9] font-mono max-h-24 overflow-y-auto" id="code-display"></div>
    <div class="flex gap-3">
      <button id="copy-btn" onclick="copyAuthCode()" class="btn-green flex-1 py-2.5 rounded-xl text-sm flex items-center justify-center gap-2">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        Copy
      </button>
      <button onclick="closeModal()" class="btn-secondary flex-1 py-2.5 rounded-xl text-sm">Close</button>
    </div>
    <div id="peer-input-section" class="hidden mt-4 flex flex-col gap-3">
      <p class="text-[#6d9ab5] text-sm">Paste the peer's response code:</p>
      <input id="authInput" class="tg-input text-xs" placeholder="Paste peer code here…"/>
      <button onclick="acceptAuthCode()" class="btn-primary py-2.5 rounded-xl text-sm">Connect</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  let authCode = '', localConnection, sendChannel, statusCheckInterval;
  let hostDisplayName = 'You', peerName = 'Peer', modalMode = 'share';

  const setupScreen     = document.getElementById('setup-screen');
  const chatScreen      = document.getElementById('chat-screen');
  const shareModal      = document.getElementById('share-modal');
  const codeDisplay     = document.getElementById('code-display');
  const topbarName      = document.getElementById('topbar-name');
  const topbarStatusEl  = document.getElementById('topbar-status');
  const peerAvatar      = document.getElementById('peer-avatar');
  const messagesEl      = document.getElementById('messages');
  const messageInput    = document.getElementById('message');
  const peerInputSection= document.getElementById('peer-input-section');
  const copyBtn         = document.getElementById('copy-btn');
  const shareBtn        = document.getElementById('share-btn');
  const emojiContainer  = document.getElementById('emoji-picker-container');

  /* ── Helpers ── */
  function appendMessage(content, side, name, isHTML = false) {
    const row = buildMessageRow(content, side, name, isHTML);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* ── Modal helpers ── */
  function openShareModal() {
    codeDisplay.textContent = authCode;
    document.getElementById('modal-title').textContent =
      modalMode === 'share' ? 'Invite Code' : 'Enter Peer Code';
    document.getElementById('modal-desc').textContent =
      modalMode === 'share'
        ? 'Share this code with your peer.'
        : "Paste the peer's response code below.";
    if (modalMode === 'accept') {
      peerInputSection.classList.remove('hidden');
      peerInputSection.style.display = 'flex';
    } else {
      peerInputSection.classList.add('hidden');
    }
    shareModal.classList.remove('hidden');
    gsap.from(shareModal.querySelector('.modal'), { y: 20, opacity: 0, duration: 0.3, ease: 'power2.out' });
  }
  function closeModal() { shareModal.classList.add('hidden'); }

  function copyAuthCode() {
    navigator.clipboard.writeText(authCode);
    copyBtn.classList.add('copy-feedback');
    copyBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Copied!`;
    setTimeout(() => {
      copyBtn.classList.remove('copy-feedback');
      copyBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy`;
    }, 2500);
  }

  async function acceptAuthCode() {
    const val = document.getElementById('authInput').value.trim();
    if (!val) { alert('Please paste the peer code.'); return; }
    const answer = JSON.parse(safeDecode(val));
    await localConnection.setRemoteDescription(answer);
    closeModal();
  }

  function monitorChannel() {
    if (sendChannel.readyState !== 'open') {
      setStatus(topbarStatusEl, 'disconnected', `${peerName} left`);
      clearInterval(statusCheckInterval);
    }
  }

  /* ── Input: auto-grow ── */
  messageInput.addEventListener('input', () => autoGrow(messageInput));
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  /* ── Emoji picker ── */
  document.getElementById('emoji-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    if (emojiContainer.classList.contains('hidden')) {
      // Lazy-load emoji-picker-element
      if (!window._emojiPickerLoaded) {
        const s = document.createElement('script');
        s.type = 'module';
        s.src = 'https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js';
        document.head.appendChild(s);
        window._emojiPickerLoaded = true;
      }
      if (!emojiContainer.querySelector('emoji-picker')) {
        const picker = document.createElement('emoji-picker');
        emojiContainer.appendChild(picker);
        picker.addEventListener('emoji-click', (ev) => {
          messageInput.focus();
          const pos = messageInput.selectionStart;
          const val = messageInput.value;
          messageInput.value = val.slice(0, pos) + ev.detail.unicode + val.slice(pos);
          messageInput.selectionStart = messageInput.selectionEnd = pos + ev.detail.unicode.length;
          autoGrow(messageInput);
        });
      }
      emojiContainer.classList.remove('hidden');
      gsap.from(emojiContainer, { y: 10, opacity: 0, duration: 0.2, ease: 'power2.out' });
    } else {
      emojiContainer.classList.add('hidden');
    }
  });
  document.addEventListener('click', () => emojiContainer.classList.add('hidden'));

  /* ── Image / GIF ── */
  document.getElementById('img-btn').addEventListener('click', () =>
    document.getElementById('img-input').click());
  document.getElementById('img-input').addEventListener('change', async (e) => {
    const file = e.target.files[0]; if (!file) return;
    e.target.value = '';
    await sendMediaFile(file);
  });

  /* ── Audio ── */
  document.getElementById('audio-btn').addEventListener('click', () =>
    document.getElementById('audio-input').click());
  document.getElementById('audio-input').addEventListener('change', async (e) => {
    const file = e.target.files[0]; if (!file) return;
    e.target.value = '';
    await sendMediaFile(file);
  });

  async function sendMediaFile(file) {
    if (!sendChannel || sendChannel.readyState !== 'open') {
      alert('Not connected yet.'); return;
    }
    const { wire, type, name, dataURL } = await prepareMediaPayload(file);
    const node = buildMediaNode(type, dataURL, name);
    appendMessage(node, 'sent', hostDisplayName);
    sendChannel.send(wire);
  }

  /* ── Send text ── */
  function sendMessage() {
    if (!sendChannel || sendChannel.readyState !== 'open') return;
    const raw = messageInput.value.trim();
    if (!raw) return;
    const msg = sanitizeHTML(raw).replace(/\n/g, '<br>');
    appendMessage(msg, 'sent', hostDisplayName, true);
    sendChannel.send(msg);
    messageInput.value = '';
    messageInput.style.height = 'auto';
  }

  /* ── WebRTC ── */
  async function startHost() {
    const nameVal = sanitizeHTML(document.getElementById('hostName').value.trim());
    if (!nameVal) { alert('Please enter your name.'); return; }
    hostDisplayName = nameVal;

    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    localConnection = new RTCPeerConnection(config);
    sendChannel = localConnection.createDataChannel('chat');

    sendChannel.onopen = () => {
      sendChannel.send(`NAME:${hostDisplayName}`);
      setStatus(topbarStatusEl, 'connected', peerName);
      topbarName.textContent = peerName;
      statusCheckInterval = setInterval(monitorChannel, 1000);
      shareBtn.style.display = 'none';
    };

    sendChannel.onmessage = (event) => {
      const raw = event.data;
      if (typeof raw === 'string' && raw.startsWith('NAME:')) {
        peerName = sanitizeHTML(raw.substring(5));
        topbarName.textContent = peerName;
        peerAvatar.textContent = peerName[0].toUpperCase();
        setStatus(topbarStatusEl, 'connected', peerName);
        return;
      }
      const parsed = parseIncoming(raw);
      if (parsed.isMedia) {
        appendMessage(parsed.node, 'received', peerName);
      } else {
        const text = sanitizeHTML(raw).replace(/&lt;br&gt;/g, '<br>');
        appendMessage(text, 'received', peerName, true);
      }
    };

    sendChannel.onclose = () => {
      clearInterval(statusCheckInterval);
      setStatus(topbarStatusEl, 'disconnected', `${peerName} disconnected`);
    };

    localConnection.onicecandidate = ({ candidate }) => {
      if (candidate) authCode = safeEncode(localConnection.localDescription);
    };

    const offer = await localConnection.createOffer();
    await localConnection.setLocalDescription(offer);
    authCode = safeEncode(offer);

    setupScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    gsap.from(chatScreen, { opacity: 0, duration: 0.4 });

    addDateStamp(messagesEl);
    setStatus(topbarStatusEl, 'waiting', 'Waiting for peer…');
    topbarName.textContent = 'Waiting for peer…';
    modalMode = 'share';
    openShareModal();

    document.getElementById('modal-title').textContent = 'Share Invite Code';
    document.getElementById('modal-desc').textContent =
      'Send this code to your peer. Then click "Enter Peer Code" after they respond.';

    const newEnterBtn = document.createElement('button');
    newEnterBtn.className = 'btn-secondary flex-1 py-2.5 rounded-xl text-sm flex items-center justify-center gap-1.5';
    newEnterBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg> Enter Peer Code`;
    newEnterBtn.onclick = () => {
      modalMode = 'accept';
      peerInputSection.classList.remove('hidden');
      peerInputSection.style.display = 'flex';
      document.getElementById('modal-title').textContent = 'Enter Peer Code';
      document.getElementById('modal-desc').textContent = 'Paste the code sent by your peer.';
      newEnterBtn.style.display = 'none';
    };
    copyBtn.parentElement.appendChild(newEnterBtn);
    shareBtn.onclick = () => { modalMode = 'share'; openShareModal(); };
  }
</script>
</body>
</html>
