<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeleChat — Host</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { font-family: 'Nunito', sans-serif; box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body { background: #17212b; color: #fff; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2b5070; border-radius: 4px; }

    #setup-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    #chat-screen { flex: 1; display: none; flex-direction: column; height: 100dvh; overflow: hidden; }

    .card {
      background: linear-gradient(145deg, #1e2e3e, #182533);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .tg-input {
      background: #1c2e3e;
      border: 1.5px solid #2b4a66;
      color: #e8f4ff;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Nunito', sans-serif;
    }
    .tg-input:focus { border-color: #2196f3; }
    .tg-input::placeholder { color: #4e7a96; }

    .btn-primary {
      background: linear-gradient(135deg, #2b6cb0, #2196f3);
      box-shadow: 0 4px 20px rgba(33,150,243,0.3);
      transition: all 0.2s ease;
      border: none; cursor: pointer; color: white; font-family: 'Nunito', sans-serif; font-weight: 700;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #2563eb, #42a5f5); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: #1c2e3e; border: 1.5px solid #2b4a66; color: #aac5d9;
      transition: all 0.2s; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 600;
    }
    .btn-secondary:hover { background: #243547; border-color: #3d6a8a; }

    .btn-green {
      background: linear-gradient(135deg, #0f7b54, #26a17b);
      box-shadow: 0 4px 16px rgba(38,161,123,0.3);
      transition: all 0.2s; border: none; cursor: pointer; color: white; font-family: 'Nunito', sans-serif; font-weight: 700;
    }
    .btn-green:hover { background: linear-gradient(135deg, #0d6b48, #2eb88a); transform: translateY(-1px); }

    #topbar { background: #1e2e3e; border-bottom: 1px solid rgba(255,255,255,0.06); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    #messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; }
    #input-area { background: #1e2e3e; border-top: 1px solid rgba(255,255,255,0.06); padding: 10px 12px; display: flex; align-items: flex-end; gap-8px; flex-shrink: 0; gap: 8px; }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 2px; }
    .msg-row.sent { flex-direction: row-reverse; }

    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }

    .bubble {
      max-width: 68%;
      padding: 8px 12px 6px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .bubble.received { background: #1e2e3e; border-bottom-left-radius: 4px; color: #e8f4ff; }
    .bubble.sent { background: linear-gradient(135deg, #1a4a7a, #2b6cb0); border-bottom-right-radius: 4px; color: #fff; }

    .bubble-name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
    .bubble-time { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 2px; text-align: right; }

    .msg-textarea { flex: 1; background: #263545; border: 1.5px solid #2b4a66; border-radius: 22px; color: #e8f4ff; padding: 10px 16px; font-size: 14px; resize: none; max-height: 100px; outline: none; font-family: 'Nunito', sans-serif; scrollbar-width: none; line-height: 1.5; }
    .msg-textarea:focus { border-color: #2196f3; }
    .msg-textarea::placeholder { color: #4e7a96; }
    .msg-textarea::-webkit-scrollbar { display: none; }

    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #2b6cb0, #2196f3); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; box-shadow: 0 2px 10px rgba(33,150,243,0.4); }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(33,150,243,0.55); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { transform: translateX(1px); }

    .datestamp { display: flex; justify-content: center; margin: 8px 0; }
    .datestamp span { background: rgba(30,46,62,0.9); padding: 4px 12px; border-radius: 20px; font-size: 11px; color: #6d9ab5; font-weight: 600; }

    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .status-connected { background: rgba(38,161,123,0.15); color: #26a17b; }
    .status-disconnected { background: rgba(220,50,50,0.12); color: #e05252; }
    .status-waiting { background: rgba(33,150,243,0.12); color: #64b5f6; }

    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #26a17b; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.8)} }
    .offline-dot { width: 8px; height: 8px; border-radius: 50%; background: #e05252; }
    .waiting-dot { width: 8px; height: 8px; border-radius: 50%; background: #64b5f6; animation: pulse-dot 1.5s infinite; }

    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 50; backdrop-filter: blur(4px); }
    .modal { background: #1e2e3e; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; width: 90%; max-width: 420px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }

    .msg-appear { animation: msg-in 0.25s cubic-bezier(0.34,1.4,0.64,1) both; }
    @keyframes msg-in { from{opacity:0;transform:scale(0.85) translateY(8px)} to{opacity:1;transform:none} }

    .copy-feedback { animation: copy-flash 0.3s ease; }
    @keyframes copy-flash { 0%{transform:scale(1)} 50%{transform:scale(0.92)} 100%{transform:scale(1)} }

    .typing-dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #6d9ab5; animation: typing 1.4s infinite; margin: 0 1.5px; }
    .typing-dots span:nth-child(2){ animation-delay: 0.2s; }
    .typing-dots span:nth-child(3){ animation-delay: 0.4s; }
    @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .hidden { display: none !important; }
    .bg-dots { background-image: radial-gradient(circle, #2b5278 1px, transparent 1px); background-size: 28px 28px; opacity: 0.2; }
  </style>
</head>
<body>

<div id="setup-screen">
  <div class="absolute inset-0 bg-dots pointer-events-none"></div>
  <div class="card rounded-2xl p-7 w-full max-w-sm flex flex-col gap-5 relative z-10">
    <div class="flex items-center gap-3 mb-2">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <div>
        <h1 class="text-xl font-extrabold text-white">New Chat</h1>
        <p class="text-xs text-[#6d9ab5]">You are the Host</p>
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-700 text-[#6d9ab5] uppercase tracking-widest">Your Name</label>
      <input id="hostName" class="tg-input" placeholder="e.g. Alice" maxlength="32" autocomplete="off"/>
    </div>

    <button id="createAuthBtn" onclick="startHost()" class="btn-primary py-3 rounded-xl text-sm w-full flex items-center justify-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      Generate Invite Code
    </button>

    <a href="index.html" class="text-center text-xs text-[#4e7a96] hover:text-[#6d9ab5] transition-colors">← Back to home</a>
  </div>
</div>

<div id="chat-screen">
  <div id="topbar">
    <button onclick="window.location.href='index.html'" class="w-8 h-8 rounded-full bg-[#263545] flex items-center justify-center hover:bg-[#2e3f52] transition-colors border-0 cursor-pointer flex-shrink-0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#aac5d9"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div id="peer-avatar" class="avatar" style="background:linear-gradient(135deg,#0f7b54,#26a17b)">P</div>
    <div class="flex flex-col flex-1 min-w-0">
      <span id="topbar-name" class="text-white font-bold text-sm truncate">Waiting…</span>
      <div id="topbar-status" class="status-badge status-waiting w-fit">
        <div class="waiting-dot"></div><span>Waiting for peer</span>
      </div>
    </div>
    <button id="share-btn" onclick="openShareModal()" class="w-9 h-9 rounded-full bg-[#263545] flex items-center justify-center hover:bg-[#2e3f52] transition-colors border-0 cursor-pointer flex-shrink-0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#aac5d9"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
    </button>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="message" class="msg-textarea" rows="1" maxlength="500" placeholder="Message"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div id="share-modal" class="modal-bg hidden">
  <div class="modal">
    <div class="flex items-center justify-between mb-4">
      <h3 id="modal-title" class="text-white font-bold text-base">Invite Code</h3>
      <button onclick="closeModal()" class="w-7 h-7 rounded-full bg-[#263545] flex items-center justify-center border-0 cursor-pointer hover:bg-[#2e3f52] transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#aac5d9"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <p id="modal-desc" class="text-[#6d9ab5] text-sm mb-3">Share this code with the peer to connect.</p>
    <div class="bg-[#263545] rounded-xl p-3 mb-4 break-all text-xs text-[#aac5d9] font-mono max-h-24 overflow-y-auto" id="code-display"></div>
    <div class="flex gap-3">
      <button id="copy-btn" onclick="copyAuthCode()" class="btn-green flex-1 py-2.5 rounded-xl text-sm flex items-center justify-center gap-2">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        Copy
      </button>
      <button onclick="closeModal()" class="btn-secondary flex-1 py-2.5 rounded-xl text-sm">Close</button>
    </div>
    <div id="peer-input-section" class="hidden mt-4 flex flex-col gap-3">
      <p class="text-[#6d9ab5] text-sm">Paste the peer's response code:</p>
      <input id="authInput" class="tg-input text-xs" placeholder="Paste peer code here…"/>
      <button onclick="acceptAuthCode()" class="btn-primary py-2.5 rounded-xl text-sm">Connect</button>
    </div>
  </div>
</div>

<script>
  let authCode = '', localConnection, sendChannel, statusCheckInterval, hostDisplayName = 'You';
  let peerName = 'Peer', modalMode = 'share';

  const setupScreen = document.getElementById('setup-screen');
  const chatScreen = document.getElementById('chat-screen');
  const shareModal = document.getElementById('share-modal');
  const codeDisplay = document.getElementById('code-display');
  const topbarName = document.getElementById('topbar-name');
  const topbarStatus = document.getElementById('topbar-status');
  const peerAvatar = document.getElementById('peer-avatar');
  const messagesEl = document.getElementById('messages');
  const messageInput = document.getElementById('message');
  const peerInputSection = document.getElementById('peer-input-section');
  const copyBtn = document.getElementById('copy-btn');
  const shareBtn = document.getElementById('share-btn');

  function sanitizeHTML(input) {
    const div = document.createElement('div');
    div.textContent = input;
    return div.innerHTML;
  }

  function safeDecode(b64) {
    try { return atob(b64); } catch(e) { alert('Invalid code.'); throw e; }
  }

  function safeEncode(json) { return btoa(JSON.stringify(json)); }

  function getTime() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m < 10 ? '0'+m : m} ${ap}`;
  }

  function getFullDate() {
    const now = new Date();
    return now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function addDateStamp() {
    const el = document.createElement('div');
    el.className = 'datestamp';
    el.innerHTML = `<span>${getFullDate()}</span>`;
    messagesEl.appendChild(el);
  }

  function addMessage(text, side, name) {
    const colors = { 'A':'#e74c3c','B':'#e67e22','C':'#2ecc71','D':'#3498db','E':'#9b59b6','F':'#1abc9c','G':'#e91e63','H':'#ff5722','I':'#00bcd4','J':'#8bc34a','K':'#ff9800','L':'#607d8b','M':'#795548','N':'#cddc39','O':'#03a9f4','P':'#673ab7','Q':'#4caf50','R':'#f44336','S':'#2196f3','T':'#ff4081','U':'#26a69a','V':'#7c4dff','W':'#66bb6a','X':'#ab47bc','Y':'#26c6da','Z':'#d4e157' };
    const firstChar = (name || 'P')[0].toUpperCase();
    const avatarColor = colors[firstChar] || '#2196f3';

    const row = document.createElement('div');
    row.className = `msg-row ${side === 'sent' ? 'sent' : ''} msg-appear`;

    if (side === 'received') {
      row.innerHTML = `
        <div class="avatar" style="background:${avatarColor}">${firstChar}</div>
        <div>
          <div class="bubble-name" style="color:${avatarColor}">${sanitizeHTML(name)}</div>
          <div class="bubble received">${text}<div class="bubble-time">${getTime()}</div></div>
        </div>`;
    } else {
      row.innerHTML = `
        <div>
          <div class="bubble sent">${text}<div class="bubble-time">${getTime()} <svg style="display:inline;vertical-align:-1px" width="12" height="12" viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div></div>
        </div>`;
    }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setStatus(type, label) {
    const dot = type === 'connected' ? '<div class="online-dot"></div>' : type === 'disconnected' ? '<div class="offline-dot"></div>' : '<div class="waiting-dot"></div>';
    const cls = type === 'connected' ? 'status-connected' : type === 'disconnected' ? 'status-disconnected' : 'status-waiting';
    topbarStatus.className = `status-badge ${cls} w-fit`;
    topbarStatus.innerHTML = `${dot}<span>${label}</span>`;
  }

  function openShareModal() {
    codeDisplay.textContent = authCode;
    document.getElementById('modal-title').textContent = modalMode === 'share' ? 'Invite Code' : 'Enter Peer Code';
    document.getElementById('modal-desc').textContent = modalMode === 'share' ? 'Share this code with your peer.' : 'Paste the peer\'s response code below.';
    if (modalMode === 'accept') {
      peerInputSection.classList.remove('hidden');
      peerInputSection.style.display = 'flex';
      codeDisplay.parentElement.querySelector('.bg-\\[\\#263545\\]') && null;
    } else {
      peerInputSection.classList.add('hidden');
    }
    shareModal.classList.remove('hidden');
    gsap.from(shareModal.querySelector('.modal'), { y: 20, opacity: 0, duration: 0.3, ease: 'power2.out' });
  }

  function closeModal() { shareModal.classList.add('hidden'); }

  function copyAuthCode() {
    navigator.clipboard.writeText(authCode);
    copyBtn.classList.add('copy-feedback');
    copyBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Copied!`;
    setTimeout(() => {
      copyBtn.classList.remove('copy-feedback');
      copyBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy`;
    }, 2500);
  }

  async function acceptAuthCode() {
    const val = document.getElementById('authInput').value.trim();
    if (!val) { alert('Please paste the peer code.'); return; }
    const answer = JSON.parse(safeDecode(val));
    await localConnection.setRemoteDescription(answer);
    closeModal();
  }

  function monitorChannel() {
    if (sendChannel.readyState !== 'open') {
      setStatus('disconnected', `${peerName} left`);
      clearInterval(statusCheckInterval);
    }
  }

  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  messageInput.addEventListener('input', () => { messageInput.scrollTop = messageInput.scrollHeight; });

  async function startHost() {
    const nameVal = sanitizeHTML(document.getElementById('hostName').value.trim());
    if (!nameVal) { alert('Please enter your name.'); return; }
    hostDisplayName = nameVal;

    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    localConnection = new RTCPeerConnection(config);
    sendChannel = localConnection.createDataChannel('chat');

    sendChannel.onopen = () => {
      sendChannel.send(`NAME:${hostDisplayName}`);
      setStatus('connected', peerName);
      topbarName.textContent = peerName;
      statusCheckInterval = setInterval(monitorChannel, 1000);
      shareBtn.style.display = 'none';
    };

    sendChannel.onmessage = (event) => {
      const data = sanitizeHTML(event.data).replace(/&lt;br&gt;/g, '<br>');
      if (data.startsWith('NAME:')) {
        peerName = data.substring(5);
        topbarName.textContent = peerName;
        peerAvatar.textContent = peerName[0].toUpperCase();
        setStatus('connected', peerName);
      } else {
        addMessage(data, 'received', peerName);
      }
    };

    sendChannel.onclose = () => {
      clearInterval(statusCheckInterval);
      setStatus('disconnected', `${peerName} disconnected`);
    };

    localConnection.onicecandidate = ({ candidate }) => {
      if (candidate) authCode = safeEncode(localConnection.localDescription);
    };

    const offer = await localConnection.createOffer();
    await localConnection.setLocalDescription(offer);
    authCode = safeEncode(offer);

    setupScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    gsap.from(chatScreen, { opacity: 0, duration: 0.4 });

    addDateStamp();
    setStatus('waiting', 'Waiting for peer…');
    topbarName.textContent = 'Waiting for peer…';
    modalMode = 'share';
    openShareModal();

    document.getElementById('modal-title').textContent = 'Share Invite Code';
    document.getElementById('modal-desc').textContent = 'Send this code to your peer. Then click "Enter Peer Code" after they respond.';
    const oldCopy = copyBtn;
    const newEnterBtn = document.createElement('button');
    newEnterBtn.className = 'btn-secondary flex-1 py-2.5 rounded-xl text-sm flex items-center justify-center gap-1.5';
    newEnterBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg> Enter Peer Code`;
    newEnterBtn.onclick = () => {
      modalMode = 'accept';
      peerInputSection.classList.remove('hidden');
      peerInputSection.style.display = 'flex';
      document.getElementById('modal-title').textContent = 'Enter Peer Code';
      document.getElementById('modal-desc').textContent = 'Paste the code sent by your peer.';
      newEnterBtn.style.display = 'none';
    };
    copyBtn.parentElement.appendChild(newEnterBtn);
    shareBtn.onclick = () => { modalMode = 'share'; openShareModal(); };
  }

  function sendMessage() {
    if (!sendChannel || sendChannel.readyState !== 'open') return;
    const msg = sanitizeHTML(messageInput.value.trim()).replace(/\n/g, '<br>');
    if (!msg) return;
    addMessage(msg, 'sent', hostDisplayName);
    sendChannel.send(msg);
    messageInput.value = '';
    messageInput.style.height = 'auto';
  }
</script>
</body>
</html>
